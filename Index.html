<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lingua Translator</h1>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Masukkan kata..." autocomplete="off">
            <button onclick="translateAction()">Terjemahkan</button>
        </div>
        <div id="resultBox" class="result-box">
            <p id="outputText">Hasil terjemahan akan muncul di sini.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
